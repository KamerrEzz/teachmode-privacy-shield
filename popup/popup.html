<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeachMode</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 300px;
        background: #111;
        color: #e5e5e5;
        font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        font-size: 13px;
      }

      /* ── Header ── */
      .header {
        background: #1a1a1a;
        border-bottom: 1px solid #2a2a2a;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 20px; height: 20px;
        background: #f97316;
        border-radius: 4px;
        display: flex; align-items: center; justify-content: center;
        font-size: 10px; font-weight: 700; color: #111; flex-shrink: 0;
      }
      .header-title { font-size: 13px; font-weight: 600; color: #fff; }
      .domain-badge {
        margin-left: auto; font-size: 10px; color: #666;
        max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }

      /* ── Section ── */
      .section { padding: 12px 16px; border-bottom: 1px solid #1e1e1e; }

      .toggle-row {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .toggle-label { display: flex; flex-direction: column; gap: 2px; }
      .toggle-label strong { color: #fff; font-size: 12px; }
      .toggle-label span { color: #555; font-size: 10px; }

      .toggle { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
      .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
      .slider {
        position: absolute; inset: 0;
        background: #2a2a2a; border-radius: 10px; cursor: pointer;
        transition: background 0.2s;
      }
      .slider::before {
        content: ""; position: absolute;
        height: 14px; width: 14px; left: 3px; bottom: 3px;
        background: #555; border-radius: 50%;
        transition: transform 0.2s, background 0.2s;
      }
      input:checked + .slider { background: #f97316; }
      input:checked + .slider::before { transform: translateX(18px); background: #fff; }
      input:disabled + .slider { opacity: 0.35; cursor: default; }

      /* ── Sub-options (compact row inside a section) ── */
      .sub-row {
        display: flex; align-items: center; justify-content: space-between;
        margin-top: 10px; padding-top: 10px;
        border-top: 1px solid #1e1e1e;
      }
      .sub-label { font-size: 11px; color: #666; }
      .sub-label strong { color: #ccc; display: block; font-size: 11px; }

      /* ── Kbd ── */
      .kbd {
        display: inline-flex; align-items: center;
        background: #1e1e1e; border: 1px solid #333; border-radius: 3px;
        padding: 1px 5px; font-size: 9px; color: #666; font-family: inherit;
      }
      .hints { margin-top: 6px; color: #333; font-size: 10px; }

      /* ── Pin badge ── */
      .pin-badge {
        display: none; font-size: 9px; color: #f97316;
        background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.3);
        border-radius: 3px; padding: 1px 5px; margin-left: 6px;
      }
      .pin-badge.visible { display: inline; }

      /* ── Custom Patterns ── */
      .collapsible-header {
        display: flex; align-items: center; justify-content: space-between;
        cursor: pointer; user-select: none;
      }
      .collapsible-header span { font-size: 11px; font-weight: 600; color: #ccc; }
      .collapsible-arrow { font-size: 10px; color: #555; transition: transform 0.2s; }
      .collapsible-body { margin-top: 10px; display: none; }
      .collapsible-body.open { display: block; }
      .collapsible-arrow.open { transform: rotate(90deg); }

      .pattern-add { display: flex; flex-direction: column; gap: 6px; }
      .pattern-input {
        background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px;
        padding: 5px 8px; color: #e5e5e5; font-family: inherit; font-size: 11px;
        width: 100%; outline: none;
        transition: border-color 0.15s;
      }
      .pattern-input:focus { border-color: #f97316; }
      .pattern-input.error { border-color: #e53e3e; }
      .pattern-input::placeholder { color: #444; }

      .pattern-add-row { display: flex; gap: 6px; }
      .btn-add {
        background: #f97316; color: #111; border: none; border-radius: 4px;
        padding: 5px 10px; font-family: inherit; font-size: 11px; font-weight: 600;
        cursor: pointer; white-space: nowrap; flex-shrink: 0;
        transition: opacity 0.15s;
      }
      .btn-add:hover { opacity: 0.85; }
      .btn-add:disabled { opacity: 0.35; cursor: default; }

      .pattern-error { font-size: 10px; color: #e53e3e; min-height: 14px; margin-top: 2px; }

      .pattern-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
      .pattern-item {
        display: flex; align-items: center; justify-content: space-between;
        background: #1a1a1a; border-radius: 4px; padding: 5px 8px; gap: 8px;
      }
      .pattern-item-label { font-size: 11px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pattern-item-regex { font-size: 10px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
      .btn-remove {
        background: none; border: none; color: #555; cursor: pointer;
        font-size: 13px; line-height: 1; padding: 0 2px; flex-shrink: 0;
        transition: color 0.15s;
      }
      .btn-remove:hover { color: #e53e3e; }
      .pattern-empty { font-size: 10px; color: #444; text-align: center; padding: 8px 0; }

      /* ── Footer ── */
      .footer {
        padding: 10px 16px;
        display: flex; align-items: center; justify-content: space-between;
      }
      .status-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #333; transition: background 0.2s;
      }
      .status-dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
      .status-text { font-size: 10px; color: #555; display: flex; align-items: center; gap: 6px; }
      .btn-reset {
        background: none; border: 1px solid #2a2a2a; color: #555;
        font-family: inherit; font-size: 10px; padding: 4px 10px;
        border-radius: 4px; cursor: pointer; transition: border-color 0.15s, color 0.15s;
      }
      .btn-reset:hover { border-color: #e53e3e; color: #e53e3e; }
    </style>
  </head>
  <body>

    <!-- Header -->
    <div class="header">
      <div class="logo">T</div>
      <span class="header-title">TeachMode</span>
      <div class="domain-badge" id="domainBadge">—</div>
    </div>

    <!-- Privacy Shield -->
    <div class="section">
      <div class="toggle-row">
        <div class="toggle-label">
          <strong>Privacy Shield <span class="pin-badge" id="pinBadge">AUTO</span></strong>
          <span>Mask IPs, tokens, account IDs</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggleEnabled" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="hints">
        <span class="kbd">Ctrl</span> <span class="kbd">Shift</span> <span class="kbd">H</span>
      </div>

      <!-- Always ON (pinned) -->
      <div class="sub-row">
        <div class="sub-label">
          <strong>Always ON here</strong>
          Auto-activate on every visit
        </div>
        <label class="toggle">
          <input type="checkbox" id="togglePinned" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Click-to-Hide -->
    <div class="section">
      <div class="toggle-row">
        <div class="toggle-label">
          <strong>Click-to-Hide</strong>
          <span>Click any element to hide it</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggleClickHide" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="hints">
        <span class="kbd">Ctrl</span> <span class="kbd">Shift</span> <span class="kbd">K</span>
        &nbsp;·&nbsp;
        <span class="kbd">Ctrl</span> <span class="kbd">Z</span> undo
      </div>

      <!-- Blur mode -->
      <div class="sub-row">
        <div class="sub-label">
          <strong>Blur instead of hide</strong>
          Desenfoque en lugar de ocultar
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggleBlurMode" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Custom Patterns -->
    <div class="section">
      <div class="collapsible-header" id="patternsToggle">
        <span>Custom Patterns</span>
        <span class="collapsible-arrow" id="patternsArrow">▶</span>
      </div>
      <div class="collapsible-body" id="patternsBody">
        <div class="pattern-add">
          <input class="pattern-input" id="patternRegex" type="text" placeholder="Regex  (e.g.  my-server-\d+)" />
          <div class="pattern-add-row">
            <input class="pattern-input" id="patternLabel" type="text" placeholder="Label  (e.g.  Server ID)" />
            <button class="btn-add" id="btnAddPattern">+ Add</button>
          </div>
          <div class="pattern-error" id="patternError"></div>
        </div>
        <div class="pattern-list" id="patternList"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="status-text">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Inactive</span>
      </div>
      <button class="btn-reset" id="btnReset">Reset page</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
